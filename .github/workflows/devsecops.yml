name: SecureOps-CRM DevSecOps Pipeline

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main" ]

jobs:
  security-scan:
    name: Shift-Left Security Audits
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🛡️ Secret Scanning (Gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 📦 SCA (NPM Audit)
        run: |
          cd frontend
          npm audit --audit-level=high

      - name: 📦 SCA (Composer Audit)
        run: |
          cd backend
          composer audit

  sast:
    name: Static Analysis (SAST)
    runs-on: ubuntu-latest
    needs: security-scan
    steps:
      - uses: actions/checkout@v4

      - name: 🐘 Backend SAST (Larastan)
        run: |
          cd backend
          # In a real environment, we'd run: ./vendor/bin/phpstan analyze
          echo "Running Larastan Security Analysis..."

      - name: ⚛️ Frontend SAST (ESLint)
        run: |
          cd frontend
          # In a real environment, we'd run: npm run lint
          echo "Running ESLint Security Rules..."

  build:
    name: Container Manifest Validation
    runs-on: ubuntu-latest
    needs: sast
    steps:
      - uses: actions/checkout@v4
      
      - name: 🐳 Dockerfile Linting (Hadolint)
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: backend/Dockerfile
      
      - name: 🏗️ Logic: Docker Build Simulation
        run: echo "Dockerizing SecureOps fragments..."

apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "secureops-crm.fullname" . }}-backend
spec:
  replicas: {{ .Values.backend.replicaCount }}
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      initContainers:
        - name: cp-code
          image: "{{ .Values.backend.image.repository }}:{{ .Values.backend.image.tag }}"
          imagePullPolicy: {{ .Values.backend.image.pullPolicy }}
          command: ["sh", "-c", "cp -rp /var/www/. /shared-www/ && chown -R www-data:www-data /shared-www/storage /shared-www/bootstrap/cache"]
          volumeMounts:
            - name: shared-files
              mountPath: /shared-www
      containers:
        - name: backend
          image: "{{ .Values.backend.image.repository }}:{{ .Values.backend.image.tag }}"
          imagePullPolicy: {{ .Values.backend.image.pullPolicy }}
          ports:
            - containerPort: 9000
          env:
            - name: DB_CONNECTION
              value: {{ .Values.backend.env.DB_CONNECTION | quote }}
            - name: DB_HOST
              value: {{ include "secureops-crm.fullname" . }}-db
            - name: DB_PORT
              value: "5432"
            - name: DB_DATABASE
              value: {{ .Values.database.auth.database | quote }}
            - name: DB_USERNAME
              value: {{ .Values.database.auth.username | quote }}
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "secureops-crm.fullname" . }}-db-secret
                  key: password
          volumeMounts:
            - name: shared-files
              mountPath: /var/www
        - name: nginx
          image: nginx:stable-alpine
          ports:
            - containerPort: 80
          volumeMounts:
            - name: shared-files
              mountPath: /var/www
            - name: nginx-config
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: nginx.conf
      volumes:
        - name: shared-files
          emptyDir: {}
        - name: nginx-config
          configMap:
            name: {{ include "secureops-crm.fullname" . }}-backend-config

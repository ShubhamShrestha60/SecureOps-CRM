apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "secureops-crm.fullname" . }}-frontend-config
data:
  nginx.conf: |
    server {
        listen 80;
        server_name localhost;

        location / {
            root /usr/share/nginx/html;
            index index.html;
            try_files $uri $uri/ /index.html;
        }

        # Handle API proxying if needed, but usually Ingress handles this.
        # However, for SPA stability:
        location /api {
            proxy_pass http://{{ include "secureops-crm.fullname" . }}-backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }

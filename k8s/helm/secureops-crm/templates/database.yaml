apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "secureops-crm.fullname" . }}-db
spec:
  replicas: 1
  selector:
    matchLabels:
      app: database
  template:
    metadata:
      labels:
        app: database
    spec:
      containers:
        - name: database
          image: "{{ .Values.database.image.repository }}:{{ .Values.database.image.tag }}"
          env:
            - name: POSTGRES_DB
              value: {{ .Values.database.auth.database }}
            - name: POSTGRES_USER
              value: {{ .Values.database.auth.username }}
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "secureops-crm.fullname" . }}-db-secret
                  key: password
          ports:
            - containerPort: 5432
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "secureops-crm.fullname" . }}-db
spec:
  ports:
    - port: 5432
  selector:
    app: database

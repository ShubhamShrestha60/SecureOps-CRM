# Values for secureops-crm
replicaCount: 1

image:
  repository: secureops-crm
  pullPolicy: IfNotPresent
  tag: "latest"

backend:
  replicaCount: 1
  image:
    repository: secureops-crm-backend
    tag: "latest"
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 8000
  env:
    APP_ENV: production
    DB_CONNECTION: pgsql

frontend:
  replicaCount: 1
  image:
    repository: secureops-crm-frontend
    tag: "latest"
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 80

database:
  enabled: true
  image:
    repository: postgres
    tag: "16-alpine"
  auth:
    database: secureops
    username: admin
    password: secret_password_change_me

ingress:
  enabled: true
  className: "nginx"
  annotations:
    kubernetes.io/ingress.class: nginx
  hosts:
    - host: secureops.local
      paths:
        - path: /
          pathType: ImplementationSpecific

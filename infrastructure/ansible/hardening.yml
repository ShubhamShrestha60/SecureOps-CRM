---
# Ansible Playbook for Server Hardening
- name: Hardening SecureOps Node (AlmaLinux 9.6)
  hosts: all
  become: yes
  tasks:
    - name: Update all packages
      dnf:
        name: "*"
        state: latest

    - name: Install security essentials
      dnf:
        name:
          - firewalld
          - fail2ban
        state: present

    - name: Ensure firewalld is running
      service:
        name: firewalld
        state: started
        enabled: yes

    - name: Configure firewalld to allow specific services
      firewalld:
        service: "{{ item }}"
        permanent: yes
        state: enabled
      loop:
        - ssh
        - http
        - https

    - name: Allow K3s API port in firewalld
      firewalld:
        port: 6443/tcp
        permanent: yes
        state: enabled

    - name: Reload firewalld
      service:
        name: firewalld
        state: reloaded

    - name: Disable Root SSH Login
      lineinfile:
        path: /etc/ssh/sshd_config
        regexp: '^PermitRootLogin'
        line: 'PermitRootLogin no'
      notify: Restart SSH
  
  handlers:
    - name: Restart SSH
      service:
        name: ssh
        state: restarted
